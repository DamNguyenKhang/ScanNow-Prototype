<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800&family=DM+Mono:wght@500;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "primary-orange": "#F97316",
                        "status-pending": "#D97706",
                        "status-ready": "#16A34A",
                        "status-occupied": "#F97316",
                        "status-empty": "#16A34A",
                        "status-suspended": "#94A3B8",
                        "background-light": "#F8F7F4",
                        "text-main": "#1C1917",
                        "text-sub": "#78716C",
                        "text-muted": "#A8A29E",
                        "border-main": "#E8E4DC",
                        "urgent-bg": "#FFFBEB",
                        "urgent-border": "#FDE68A",
                    },
                    fontFamily: {
                        "display": ["Nunito", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["DM Mono", "monospace"],
                        "price": ["Outfit", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    boxShadow: {
                        "card": "0 2px 10px rgba(0, 0, 0, 0.05)",
                        "float": "0 8px 24px rgba(0,0,0,0.12)",
                        "sheet": "0 -4px 24px rgba(0,0,0,0.10)",
                    }
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Scrollbar for desktop */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #E8E4DC;
            border-radius: 20px;
        }

        .view-transition {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-item.active {
            background-color: #EFF6FF;
            color: #2563EB;
            font-weight: 600;
        }

        .nav-item.active .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
        }

        .order-item-active {
            background-color: #EFF6FF;
            border-color: #BFDBFE;
        }

        .tab-active {
            border-bottom: 2px solid #2563EB;
            color: #2563EB;
            font-weight: 600;
        }
    </style>
    <title>Cashier POS - ScanNow</title>
</head>

<body class="bg-background-light font-body text-text-main h-screen flex overflow-hidden selection:bg-primary/10">

    <!-- SIDEBAR -->
    <aside
        class="w-[80px] lg:w-[240px] bg-white border-r border-border-main flex flex-col justify-between py-6 shrink-0 z-20">
        <div class="px-4 flex flex-col gap-8">
            <div class="flex items-center justify-center lg:justify-start gap-2 px-2">
                <div
                    class="size-10 bg-primary text-white rounded-xl flex items-center justify-center shrink-0 shadow-lg shadow-primary/30">
                    <span class="material-symbols-outlined text-[24px]">point_of_sale</span>
                </div>
                <div class="hidden lg:flex flex-col">
                    <span
                        class="font-display font-extrabold text-[20px] text-text-main tracking-tight leading-none">ScanNow</span>
                    <span class="text-[11px] font-bold text-primary uppercase tracking-wider mt-0.5">Cashier</span>
                </div>
            </div>

            <nav class="flex flex-col gap-2">
                <button onclick="router.navigate('orders')" id="nav-orders" data-view="orders"
                    class="nav-item active flex items-center gap-4 px-3 py-3 rounded-lg text-text-sub hover:bg-gray-50 transition-colors relative">
                    <span class="material-symbols-outlined text-[24px]">receipt_long</span>
                    <span class="font-medium hidden lg:block text-[15px]">Quản lý đơn</span>
                    <span class="absolute top-2 right-2 lg:right-3 size-2 bg-red-500 rounded-full"></span>
                </button>
                <button onclick="router.navigate('tables')" id="nav-tables" data-view="tables"
                    class="nav-item flex items-center gap-4 px-3 py-3 rounded-lg text-text-sub hover:bg-gray-50 transition-colors">
                    <span class="material-symbols-outlined text-[24px]">grid_view</span>
                    <span class="font-medium hidden lg:block text-[15px]">Sơ đồ bàn</span>
                </button>
                <button onclick="router.navigate('create')" id="nav-create" data-view="create"
                    class="nav-item flex items-center gap-4 px-3 py-3 rounded-lg text-text-sub hover:bg-gray-50 transition-colors">
                    <span class="material-symbols-outlined text-[24px]">add_circle</span>
                    <span class="font-medium hidden lg:block text-[15px]">Tạo đơn mới</span>
                </button>
                <button onclick="router.navigate('history')" id="nav-history" data-view="history"
                    class="nav-item flex items-center gap-4 px-3 py-3 rounded-lg text-text-sub hover:bg-gray-50 transition-colors">
                    <span class="material-symbols-outlined text-[24px]">history</span>
                    <span class="font-medium hidden lg:block text-[15px]">Lịch sử GD</span>
                </button>
                <button onclick="router.navigate('report')" id="nav-report" data-view="report"
                    class="nav-item flex items-center gap-4 px-3 py-3 rounded-lg text-text-sub hover:bg-gray-50 transition-colors">
                    <span class="material-symbols-outlined text-[24px]">monitoring</span>
                    <span class="font-medium hidden lg:block text-[15px]">Báo cáo ca</span>
                </button>
            </nav>
        </div>

        <div class="px-4">
            <button
                class="nav-item flex items-center gap-4 px-3 py-3 rounded-lg text-text-sub hover:bg-gray-50 transition-colors w-full">
                <img src="https://ui-avatars.com/api/?name=Thu+Ngan&background=E5E7EB&color=374151"
                    class="size-8 rounded-full" alt="Avatar" />
                <div class="flex flex-col items-start hidden lg:flex">
                    <span class="font-bold text-[14px]">Thu Ngân 1</span>
                    <span class="text-[12px] text-text-muted">Ca Sáng</span>
                </div>
                <span class="material-symbols-outlined text-[20px] ml-auto hidden lg:block">logout</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- GLOBAL HEADER -->
        <header class="h-[72px] bg-white border-b border-border-main px-6 flex items-center justify-between shrink-0">
            <h1 id="header-title" class="font-display font-bold text-[20px] text-text-main">Quản lý Đơn Hàng</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-gray-100 rounded-full px-3 py-1.5 border border-gray-200">
                    <span class="relative flex h-2.5 w-2.5 shrink-0">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-status-ready opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-status-ready"></span>
                    </span>
                    <span class="text-[13px] font-bold text-text-main uppercase tracking-wider">Online</span>
                </div>
                <div class="text-right flex flex-col">
                    <span id="current-time" class="font-mono font-bold text-[15px] text-text-main">10:30:00</span>
                    <span id="current-date" class="text-[12px] text-text-muted">Hôm nay</span>
                </div>
            </div>
        </header>

        <!-- VIEWS -->
        <div id="views-container" class="flex-1 overflow-auto relative bg-[#F3F4F6]">
            <!-- VIEWS INJECTED HERE -->
        </div>
    </main>

    <!-- TOAST -->
    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Scripts for Components and SPA Logic -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/data.js"></script>
    <script src="js/table-map-component.js"></script>
    <script src="js/orders-component.js"></script>
    <script src="js/create-order-component.js"></script>
    <script src="js/reports-component.js"></script>
    <script src="js/router.js"></script>
    <script>
        // Start the application
        window.addEventListener('load', () => {
            const initialView = new URLSearchParams(window.location.search).get('view') || 'orders';
            router.navigate(initialView, false);

            setInterval(() => {
                const now = new Date();
                const timeEl = document.getElementById('current-time');
                if (timeEl) timeEl.textContent = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }, 1000);

            const dateEl = document.getElementById('current-date');
            if (dateEl) {
                const now = new Date();
                dateEl.textContent = now.toLocaleDateString('vi-VN');
            }
        });
    </script>
</body>

</html>
