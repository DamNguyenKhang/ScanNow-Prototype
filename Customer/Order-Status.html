<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ScanNow Order Status</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#f97415",
              "primary-content": "#ffffff",
              "background-light": "#F8F7F4",
              "background-dark": "#1a120b",
              "secondary-text": "#8c725f",
              "surface-light": "#ffffff",
              "surface-dark": "#2a221c",
              "accent-blue": "#3b82f6",
              "accent-blue-bg": "#eff6ff",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      /* Custom styles for vertical stepper line */
      .step-line {
        position: absolute;
        left: 19px; /* Half of icon width roughly + padding */
        top: 40px;
        bottom: -16px;
        width: 2px;
        background-color: #e5e7eb; /* gray-200 */
        z-index: 0;
      }
      .last-step .step-line {
        display: none;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col font-display antialiased overflow-x-hidden"
  >
    <!-- Top App Bar -->
    <div
      class="flex items-center px-4 py-3 justify-between bg-surface-light dark:bg-surface-dark shadow-sm sticky top-0 z-50"
    >
      <!-- BACK BUTTON TO Menu.html -->
      <button
        onclick="window.location.href = 'Menu.html'"
        class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
      >
        <span class="material-symbols-outlined">close</span>
      </button>
      <h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">
        Order Status
      </h2>
      <div class="flex size-10 items-center justify-center">
        <!-- Placeholder for balance on right side if needed, or empty -->
      </div>
    </div>
    <div class="flex flex-col flex-1 px-5 py-6 w-full max-w-md mx-auto">
      <!-- Hero Section: Success -->
      <div class="flex flex-col items-center gap-6 mb-8">
        <div
          class="size-[100px] rounded-full bg-gradient-to-br from-primary to-orange-400 flex items-center justify-center shadow-lg shadow-primary/20 animate-fade-in-up"
        >
          <span
            class="material-symbols-outlined text-white text-[48px] font-bold"
            >check</span
          >
        </div>
        <div class="flex flex-col items-center gap-3">
          <h1
            class="text-2xl font-bold text-center text-slate-900 dark:text-white"
          >
            Order Successful! 🎉
          </h1>
          <p
            class="text-slate-500 dark:text-slate-400 text-sm text-center max-w-[280px]"
          >
            Your order has been sent to the kitchen and is being processed.
          </p>
          <div
            class="mt-1 flex items-center justify-center gap-2 rounded-full bg-accent-blue-bg dark:bg-accent-blue/20 px-4 py-1.5"
          >
            <span
              class="material-symbols-outlined text-accent-blue dark:text-blue-300 text-[18px]"
              >receipt_long</span
            >
            <span
              class="text-accent-blue dark:text-blue-300 text-sm font-semibold tracking-wide" id="order-id"
              >ID: SN-0000</span
            >
          </div>
        </div>
      </div>

      <!-- Your Orders -->
      <div class="mb-16 w-full" id="orders-container">
        <!-- Will be filled by JavaScript -->
      </div>
    </div>
    <!-- Sticky Bottom Actions -->
    <div
      class="sticky bottom-0 w-full bg-surface-light dark:bg-surface-dark border-t border-slate-100 dark:border-slate-800 p-4 pb-8 flex flex-col gap-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-40"
    >
      <!-- ADD MORE ITEMS BUTTON -->
      <button
        onclick="window.location.href = 'Menu.html'"
        class="w-full flex items-center justify-center gap-2 rounded-xl bg-primary hover:bg-orange-600 py-3.5 px-6 text-white font-bold text-base transition-colors"
      >
        <span class="material-symbols-outlined">add_shopping_cart</span>
        Add More Items
      </button>
      <!-- BACK TO MENU BUTTON -->
      <button
        onclick="window.location.href = 'Menu.html'"
        class="w-full flex items-center justify-center gap-2 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-transparent py-3.5 px-6 text-slate-900 dark:text-white font-bold text-base hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors"
      >
        <span class="material-symbols-outlined">restaurant_menu</span>
        Back to Menu
      </button>
      <a
        class="flex items-center justify-center gap-1.5 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors"
        href="#"
      >
        Need help?
        <span
          class="text-primary underline decoration-primary/30 underline-offset-2"
          >Call staff</span
        >
      </a>
    </div>
  </body>
</html>
<script src="shared-state.js"></script>
<script>
function getStatusSteps() {
  return [
    { id: 'placed', icon: 'check', title: 'Order Placed', desc: "We've received your order.", status: 'completed' },
    { id: 'confirmed', icon: 'schedule', title: 'Awaiting Confirmation', desc: 'Restaurant is reviewing your order.', status: 'active' },
    { id: 'preparing', icon: 'skillet', title: 'Preparing', desc: 'Your food is being prepared.', status: 'pending' },
    { id: 'ready', icon: 'room_service', title: 'Ready to Serve', desc: 'Your order is ready!', status: 'pending' }
  ];
}

function renderTrackingSteps() {
  const steps = getStatusSteps();
  const stepsHtml = steps.map((step, idx) => {
    const isLast = idx === steps.length - 1;
    let statusClass = '';
    if (step.status === 'completed') {
      statusClass = 'bg-primary text-white shadow-md shadow-primary/20';
    } else if (step.status === 'active') {
      statusClass = 'bg-surface-light dark:bg-surface-dark border-2 border-primary text-primary shadow-sm';
    } else {
      statusClass = 'bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500';
    }
    
    return `
      <div class="relative flex gap-4 pb-8 group ${isLast ? 'last-step' : ''}">
        ${!isLast ? `<div class="step-line ${step.status === 'completed' ? 'bg-primary/30' : 'bg-slate-200 dark:bg-slate-700'}"></div>` : ''}
        <div class="relative z-10 flex flex-col items-center">
          <div class="flex size-10 items-center justify-center rounded-full ${statusClass}">
            <span class="material-symbols-outlined text-[20px] ${step.status === 'active' ? 'animate-pulse' : ''}">
              ${step.icon}
            </span>
          </div>
        </div>
        <div class="flex flex-col pt-1">
          <p class="text-base font-bold text-slate-900 dark:text-white leading-tight">
            ${step.title}
          </p>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
            ${step.desc}
          </p>
        </div>
      </div>
    `;
  }).join('');
  
  return `<div class="flex flex-col gap-0 w-full">${stepsHtml}</div>`;
}

function loadOrdersUI() {
  const orders = getAllOrders();
  
  if (orders.length === 0) {
    alert('No orders found. Please place an order first.');
    window.location.href = 'Menu.html';
    return;
  }
  
  // Update order ID to the latest
  const lastOrder = orders[0];
  document.getElementById('order-id').innerText = 'ID: ' + lastOrder.id;
  
  // Render all orders
  renderAllOrders(orders);
}

function renderAllOrders(orders) {
  const container = document.getElementById('orders-container');
  
  const ordersHtml = orders.map((order, idx) => {
    const itemCount = order.items.reduce((sum, item) => sum + item.qty, 0);
    
    let itemsHtml = order.items.map(item => `
      <div class="flex justify-between items-start text-sm">
        <span class="text-slate-700 dark:text-slate-300">
          <span class="font-bold text-primary mr-1">${item.qty}x</span> ${item.name}
        </span>
        <span class="text-slate-900 dark:text-white font-medium">${formatVND(item.price * item.qty)}</span>
      </div>
    `).join('');
    
    const itemPreview = order.items.map(item => `${item.name} (x${item.qty})`).join(', ');
    const trackingSteps = renderTrackingSteps();
    
    return `
      <div class="mb-4">
        <details class="group bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 overflow-hidden transition-all duration-300">
          <summary class="flex cursor-pointer items-center justify-between p-4 list-none select-none">
            <div class="flex flex-col gap-1 flex-1">
              <div class="flex items-center gap-2">
                <span class="text-xs font-bold text-primary bg-primary/10 px-2 py-1 rounded-full">${order.id}</span>
                <span class="text-xs text-slate-500">${order.time}</span>
              </div>
              <span class="font-bold text-slate-900 dark:text-slate-100 text-base">${itemCount} items · ${formatVND(order.total)}</span>
              <span class="text-sm text-slate-500 dark:text-slate-400 font-medium truncate max-w-[200px] sm:max-w-xs group-open:hidden">${itemPreview}</span>
            </div>
            <span class="material-symbols-outlined text-slate-400 group-open:rotate-180 transition-transform duration-300">expand_more</span>
          </summary>
          <div class="px-4 pb-4 border-t border-slate-100 dark:border-slate-800 pt-4 flex flex-col gap-6 animate-fade-in">
            <!-- Items Section -->
            <div class="flex flex-col gap-3">
              <h4 class="text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider">Items</h4>
              ${itemsHtml}
              <div class="mt-2 pt-2 border-t border-dashed border-slate-200 dark:border-slate-700 flex justify-between items-center">
                <span class="text-xs text-slate-400 uppercase font-semibold tracking-wider">Total</span>
                <span class="font-bold text-lg text-primary">${formatVND(order.total)}</span>
              </div>
            </div>
            
            <!-- Status Section -->
            <div class="flex flex-col gap-3">
              <h4 class="text-sm font-bold text-slate-700 dark:text-slate-300 uppercase tracking-wider">Order Status</h4>
              ${trackingSteps}
            </div>
          </div>
        </details>
      </div>
    `;
  }).join('');
  
  container.innerHTML = `<div>${ordersHtml}</div>`;
}

document.addEventListener('DOMContentLoaded', () => {
  loadOrdersUI();
});
</script>
</html>
