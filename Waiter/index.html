<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800&family=DM+Mono:wght@500;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "primary-orange": "#F97316",
                        "status-pending": "#D97706",
                        "status-ready": "#16A34A",
                        "status-occupied": "#F97316",
                        "status-empty": "#16A34A",
                        "status-suspended": "#94A3B8",
                        "background-light": "#F8F7F4",
                        "text-main": "#1C1917",
                        "text-sub": "#78716C",
                        "text-muted": "#A8A29E",
                        "border-main": "#E8E4DC",
                        "urgent-bg": "#FFFBEB",
                        "urgent-border": "#FDE68A",
                    },
                    fontFamily: {
                        "display": ["Nunito", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["DM Mono", "monospace"],
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                    boxShadow: {
                        "card": "0 2px 10px rgba(0, 0, 0, 0.05)",
                        "float": "0 8px 24px rgba(0,0,0,0.12)",
                        "sheet": "0 -4px 24px rgba(0,0,0,0.10)",
                    }
                },
            },
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .view-transition {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bottom-sheet.hidden {
            transform: translateY(100%);
            display: block !important;
        }

        .bottom-sheet-overlay {
            transition: opacity 0.3s ease;
        }

        .bottom-sheet-overlay.hidden {
            opacity: 0;
            display: block !important;
            pointer-events: none;
        }

        /* Safe area bottom for notched phones */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
    <title>Waiter Dashboard - ScanNow</title>
</head>

<body class="bg-[#F3F4F6] font-body text-text-main min-h-screen flex justify-center selection:bg-primary/10">
    <!-- SPA Shell -->
    <div id="spa-shell"
        class="relative w-full max-w-[500px] h-screen bg-background-light shadow-2xl flex flex-col overflow-hidden sm:border-x border-border-main">

        <!-- HEADER (Shared) -->
        <header id="main-header"
            class="sticky top-0 z-40 bg-white border-b border-border-main h-[60px] px-4 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-2">
                <span class="font-display font-extrabold text-[18px] text-primary tracking-tight">ScanNow</span>
            </div>
            <h2 id="header-title" class="font-display font-bold text-[16px] text-text-main">Đơn hàng</h2>
            <div id="header-actions" class="flex items-center gap-3">
                <div class="flex items-center gap-1.5" id="live-indicator">
                    <span class="relative flex h-2 w-2 shrink-0">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-status-ready opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-status-ready"></span>
                    </span>
                    <span class="text-[11px] font-medium text-text-muted uppercase tracking-wider">Live</span>
                </div>
                <button class="relative">
                    <span class="material-symbols-outlined text-[24px] text-text-sub">notifications</span>
                    <span
                        class="absolute -top-0.5 -right-0.5 size-4 bg-red-500 text-white text-[9px] font-bold flex items-center justify-center rounded-full ring-2 ring-white">3</span>
                </button>
            </div>
        </header>

        <!-- VIEW CONTAINER -->
        <main id="app-view" class="flex-1 overflow-hidden relative">
            <!-- Content will be injected here -->
        </main>

        <!-- BOTTOM NAVIGATION (Shared) -->
        <nav id="bottom-nav"
            class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[500px] h-[72px] bg-white/90 backdrop-blur-md border-t border-border-main flex items-center justify-around px-2 z-50 pb-safe">
            <button onclick="router.navigate('orders')"
                class="nav-item flex flex-col items-center gap-1 group text-primary" data-view="orders">
                <span class="material-symbols-outlined text-[24px]">assignment</span>
                <span class="text-[10px] font-display font-bold">Đơn hàng</span>
            </button>
            <button onclick="router.navigate('table-map')"
                class="nav-item flex flex-col items-center gap-1 group text-text-muted hover:text-primary transition-colors"
                data-view="table-map">
                <span class="material-symbols-outlined text-[24px]">grid_view</span>
                <span class="text-[10px] font-display font-medium">Sơ đồ bàn</span>
            </button>
            <div class="relative -top-3">
                <button onclick="router.navigate('create-order')"
                    class="nav-item size-14 bg-primary text-white rounded-full shadow-lg shadow-primary/30 flex items-center justify-center active:scale-95 transition-transform"
                    data-view="create-order">
                    <span class="material-symbols-outlined text-[30px]">add</span>
                </button>
                <span
                    class="absolute -bottom-5 left-1/2 -translate-x-1/2 text-[10px] font-display font-medium text-text-muted"></span>
            </div>
            <button onclick="router.navigate('menu')"
                class="nav-item flex flex-col items-center gap-1 group text-text-muted hover:text-primary transition-colors"
                data-view="menu">
                <span class="material-symbols-outlined text-[24px]">restaurant_menu</span>
                <span class="text-[10px] font-display font-medium">Menu</span>
            </button>
            <button onclick="router.navigate('profile')"
                class="nav-item flex flex-col items-center gap-1 group text-text-muted hover:text-primary transition-colors"
                data-view="profile">
                <span class="material-symbols-outlined text-[24px]">account_circle</span>
                <span class="text-[10px] font-display font-medium">Tôi</span>
            </button>
        </nav>

        <!-- TOAST CONTAINER (Shared) -->
        <div id="toast-container"
            class="fixed top-4 left-1/2 -translate-x-1/2 z-[60] w-[358px] flex flex-col gap-2 pointer-events-none">
        </div>
    </div>

    <!-- Scripts for Components and SPA Logic -->
    <script src="js/data.js"></script>
    <script src="js/orders-component.js"></script>
    <script src="js/table-map-component.js"></script>
    <script src="js/create-order-component.js"></script>
    <script src="js/menu-component.js"></script>
    <script src="js/profile-component.js"></script>
    <script src="js/router.js"></script>
    <script>
        // Start the application
        window.addEventListener('load', () => {
            const initialView = new URLSearchParams(window.location.search).get('view') || 'orders';
            router.navigate(initialView, false);

            // Notification simulation
            setTimeout(() => {
                if (typeof showNewOrderToast === 'function') {
                    showNewOrderToast("B5", 3);
                }
            }, 8000);
        });
    </script>
</body>

</html>
